instruments:
  psu:
    resource: "PLACEHOLDER"
    timeout_ms: 5000
    combination_mode: INDEPENDENT
    hardware_wiring_confirmed: false

  load:
    resource: "PLACEHOLDER"
    timeout_ms: 5000

  dmm_voltage:
    resource: "PLACEHOLDER"
    timeout_ms: 10000

  dmm_temperature:
    resource: "PLACEHOLDER"
    timeout_ms: 10000

psu_limits_by_mode:
  INDEPENDENT:
    max_voltage_V: 30.0
    max_current_A: 1.5
  PARALLEL:
    max_voltage_V: 30.0
    max_current_A: 3.0
  SERIES:
    max_voltage_V: 60.0
    max_current_A: 1.5

dmm_voltage:
  range_V: 100
  nplc_charge: 10
  nplc_discharge: 10
  nplc_relax: 100
  nplc_ocv: 100
  autozero: true
  autorange: false
  timeout_nplc100_ms: 30000

timing:
  measurement_sample_period_s: 2
  control_update_period_s: 5
  gui_update_period_s: 1
  relax_sample_period_s: 30
  checkpoint_period_s: 10
  sqlite_commit_interval_s: 10
  csv_flush_interval_s: 5

safety:
  max_charge_Ah_factor: 1.20
  max_discharge_Ah_factor: 1.10
  temperature_dmm_fault_timeout_s: 60
  fallback_max_duration_s: 30

series_diode:
  type: "silicon_rectifier"
  part_number: "BY550"
  part_number_variant: null
  max_expected_drop_V_independent: 0.90
  max_expected_drop_V_parallel: 1.10
  max_expected_drop_V_series: 0.90
  max_reverse_leakage_uA: 10
  warning_series_drop_V: 1.20
  fault_series_drop_V: 1.50
  fault_series_drop_V_bq: 3.50
  diode_power_warning_W: 2.0
  diode_power_critical_warning_W: 3.0
  thermal_note: "BY550 DO-201AD, 5A. Hűtőborda 3A felett erősen ajánlott."

taper:
  hold_s: 600
  current_tolerance_factor: 1.05
  cv_voltage_tolerance_V_per_cell: 0.003

temperature_compensation_mode: MONITOR_ONLY
